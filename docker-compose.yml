services:
  discovery:
    build:
      context: .
      args:
        - SPRING_PROFILES_ACTIVE=prod
    image: amcir-discovery:latest
    container_name: discovery-server
    restart: always
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8761
      - EUREKA_HOSTNAME=discovery-server
      # Overriding some prod values for standard container usage (local or VPS)
      # If deploying to Render, these would be set in Render dashboard
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=discovery-server
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - discovery-network

networks:
  discovery-network:
    driver: bridge
