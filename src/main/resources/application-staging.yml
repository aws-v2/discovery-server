spring:
  application:
    name: discovery

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
  instance:
    hostname: discovery-server
    prefer-ip-address: false

logging:
  level:
    root: INFO
    "[com.netflix.eureka]": INFO
    "[com.netflix.discovery]": INFO
