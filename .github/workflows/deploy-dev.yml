name: Dev CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

permissions:
  contents: write
  pull-requests: write

jobs:
  dev-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test
  
  dev-build-and-push:
    needs: dev-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/discovery-server:dev
          build-args: |
            SPRING_PROFILES_ACTIVE=dev
            DEV_SERVER_PORT=8761
            DEV_EUREKA_URL=localhost

  dev-deploy:
    needs: dev-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Dev via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            docker pull qarani/discovery-server:dev
            docker stop discovery-server-dev || true
            docker rm discovery-server-dev || true
            docker run -d \
              --name discovery-server-dev \
              --network aws-dev-network \
              -p 8761:8761 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e DEV_SERVER_PORT=8761 \
              -e DEV_EUREKA_URL=discovery-server-dev \
              qarani/discovery-server:dev
    

  dev-open-pr-to-staging:
    needs: dev-deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR dev → staging
        run: |
          # Check if PR already exists
          if gh pr list --base staging --head dev --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "chore: promote dev → staging" \
              --body "✅ All tests passed on dev. Auto-generated PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT}} 