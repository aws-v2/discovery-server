name: Staging Deployment

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]

jobs:
  staging-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test

  staging-build-and-push:
    needs: staging-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/discovery-server:staging
        build-args: |
          SPRING_PROFILES_ACTIVE=staging

  staging-deploy:
    needs: staging-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull qarani/discovery-server:staging
            docker stop discovery-server-staging || true
            docker rm discovery-server-staging || true
            docker run -d \
              --name discovery-server-staging \
              --network aws-staging-network \
              -p 8761:8761 \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e STAGING_SERVER_PORT=8761 \
              -e STAGING_EUREKA_URL=discovery-server-staging \
              qarani/discovery-server:staging

  staging-open-pr-to-main:
    needs: staging-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging → main
        run: |
          if gh pr list --base main --head staging --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "✅ Staging deployment succeeded. Auto-generated PR for production release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}