name: Prod deployment

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  prod-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test


  prod-build-and-push:
    needs: prod-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/discovery-server:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod


  prod-deploy:
    needs: prod-build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Production via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create --driver overlay prod-overlay-net || true 
            set -e

            echo "Pulling latest image..."
            docker pull qarani/discovery-server:prod

            echo "Removing old service..."
            docker service rm discovery-server-prod || true

            echo "Deploying new Swarm service..."
            docker service create \
              --name discovery-server-prod \
              --network prod-overlay-net \
              -p 8761:8761 \
              --env SPRING_PROFILES_ACTIVE=prod \
              --env SERVER_PORT=8761 \
              --env EUREKA_URL=http://discovery-server-prod:8761 \
              qarani/discovery-server:prod

            echo "Deployment complete."